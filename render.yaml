services:
  - type: web
    name: errorlog-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: errorlog-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: errorlog-ai-redis
          type: redis
          property: connectionString
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"

  - type: redis
    name: errorlog-ai-redis
    plan: free
    ipAllowList: []

databases:
  - name: errorlog-ai-db
    plan: free
